      <rect x="76" y="-70" width="28" height="140" fill="#FCB827"/>
      <rect x="104" y="-70" width="28" height="140" fill="#F5821F"/>
      <rect x="132" y="-70" width="28" height="140" fill="#E03A3E"/>
      <rect x="160" y="-70" width="28" height="140" fill="#009DDC"/>
    </g>

    <g clip-path="url(#halfcan)">
      <ellipse cx="0" cy="70" rx="50" ry="12" fill="#2a2a2a"/>
      <rect x="-50" y="-70" width="100" height="140" fill="#2a2a2a"/>
      <ellipse cx="0" cy="-70" rx="50" ry="12" fill="#404040"/>
    </g>
